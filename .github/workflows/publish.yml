name: Publish Supervisor Image

# Triggered by the monorepo's supervisor-release workflow after the
# release binaries have been uploaded to Tigris (ampbase.io/releases/...).
# `workflow_dispatch` is exposed for ad-hoc re-runs against any existing
# released version — no `:latest` tag is produced from manual runs, and
# the cosign signing + provenance steps are skipped so manual probes
# can't pollute the supply chain attestations.
on:
  repository_dispatch:
    types: [supervisor-release]
  workflow_dispatch:
    inputs:
      version:
        description: "Version tag (e.g. v0.1.0) — must already exist under ampbase.io/releases/{version}/"
        required: true

permissions:
  contents: read
  packages: write
  id-token: write
  attestations: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Resolve version
        id: ver
        env:
          DISPATCH_VERSION: ${{ github.event.client_payload.version }}
          INPUT_VERSION: ${{ inputs.version }}
        run: |
          set -eu
          if [ "${{ github.event_name }}" = "repository_dispatch" ]; then
            version="$DISPATCH_VERSION"
          else
            version="$INPUT_VERSION"
          fi
          # Strict semver guard — mirrors the monorepo's supervisor-release
          # version check so a malformed dispatch payload can't tag GHCR with
          # something like ":foo".
          if ! printf '%s' "$version" | grep -Eq '^v[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$'; then
            echo "invalid version: $version" >&2
            exit 1
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ghcr.io/ampbase-io/supervisor
          # `:latest` only on the automated path. Manual dispatch must not
          # move :latest backwards if a maintainer re-runs an older version.
          tags: |
            type=raw,value=${{ steps.ver.outputs.version }}
            type=raw,value=latest,enable=${{ github.event_name == 'repository_dispatch' }}
          # Labels live on the per-platform image configs; GHCR's package
          # page reads the multi-arch description from index annotations
          # (see below), not from labels.
          labels: |
            org.opencontainers.image.title=Ampbase Supervisor
            org.opencontainers.image.description=Universal OpAMP supervisor for managing observability agents (Fluent Bit, Vector, OTel Collector, Telegraf, Refinery)
            org.opencontainers.image.url=https://ampbase.io
            org.opencontainers.image.source=https://github.com/ampbase-io/supervisor
            org.opencontainers.image.vendor=Ampbase, LLC
            org.opencontainers.image.licenses=LicenseRef-Ampbase-CSA
            org.opencontainers.image.version=${{ steps.ver.outputs.version }}
          # `index:` prefix targets the multi-arch index manifest. GHCR
          # pulls the package page description from here for multi-arch
          # images. Mirrors the labels above.
          annotations: |
            index:org.opencontainers.image.title=Ampbase Supervisor
            index:org.opencontainers.image.description=Universal OpAMP supervisor for managing observability agents (Fluent Bit, Vector, OTel Collector, Telegraf, Refinery)
            index:org.opencontainers.image.url=https://ampbase.io
            index:org.opencontainers.image.source=https://github.com/ampbase-io/supervisor
            index:org.opencontainers.image.vendor=Ampbase, LLC
            index:org.opencontainers.image.licenses=LicenseRef-Ampbase-CSA
            index:org.opencontainers.image.version=${{ steps.ver.outputs.version }}

      - uses: docker/build-push-action@v6
        id: build
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          annotations: ${{ steps.meta.outputs.annotations }}
          build-args: |
            VERSION=${{ steps.ver.outputs.version }}
          provenance: mode=max
          sbom: true

      # Sign + attest only on the automated path. Manual dispatches are
      # for re-runs / metadata probes and should not produce additional
      # signatures on top of the canonical release.
      - uses: sigstore/cosign-installer@v3
        if: github.event_name == 'repository_dispatch'

      - name: Sign image
        if: github.event_name == 'repository_dispatch'
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
          TAGS: ${{ steps.meta.outputs.tags }}
        run: |
          echo "$TAGS" | xargs -I {} cosign sign --yes {}@${DIGEST}

      - uses: actions/attest-build-provenance@v2
        if: github.event_name == 'repository_dispatch'
        with:
          subject-name: ghcr.io/ampbase-io/supervisor
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true
